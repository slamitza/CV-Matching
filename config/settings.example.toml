# Copy this file to config/settings.toml and edit it for your search.

database_path = "data/job_matcher.sqlite3"

# Keep this false for a pure job-tracking database. Set true only if you
# explicitly want CV keyword scoring in addition to dedupe/tracking.
score_jobs = false
minimum_score = 35

# These terms are used by source adapters and Chrome review helpers that support search queries.
search_terms = [
  "Data Science",
  "Bioinformatics",
  "AI engineer",
  "ML engineer",
  "Data Scientist",
  "Software Engineer",
  "Biostatistic",
  "Biostatistician",
  "Research Engineer"
]

# Case-insensitive company name fragments skipped during imports and scans.
excluded_companies = []

[cv]
path = "data/cv.txt"

# Required keywords receive extra weight in the score.
required_keywords = [
  "python",
  "sql",
  "machine",
  "learning",
  "bioinformatics",
  "ai",
  "ml"
]

[[sources]]
name = "remote-python"
type = "remotive"
enabled = true
search = "python"
category = "software-dev"

[[sources]]
name = "manual-csv"
type = "csv"
enabled = false
# Copy data/manual_jobs.example.csv to data/manual_jobs.csv and paste job alerts,
# saved jobs, or manually reviewed LinkedIn/Indeed/company listings there.
path = "data/manual_jobs.csv"
exclude_title_keywords = [
  "linux"
]

[[sources]]
name = "rss-example"
type = "rss"
enabled = false
url = "https://example.com/jobs.rss"
default_company = "Unknown"

[chrome.linkedin]
location = "Switzerland"
easy_apply_only = false
experience_levels = []
exclude_title_keywords = [
  "writer",
  "director",
  "executive",
  "junior",
  "doctoral",
  "trainee",
  "intern",
  "internship",
  "head of",
  "linux"
]
searches = [
  "Data Science",
  "Bioinformatics",
  "AI engineer",
  "ML engineer",
  "Data Scientist",
  "Software Engineer",
  "Biostatistic",
  "Biostatistician",
  "Research Engineer"
]

[chrome.indeed]
base_url = "https://ch.indeed.com/jobs"
location = "Switzerland"
exclude_title_keywords = [
